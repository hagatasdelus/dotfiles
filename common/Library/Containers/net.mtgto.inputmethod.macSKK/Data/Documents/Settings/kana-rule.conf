# 2つ目の要素を "<shift>" + 入力したいキーで書くと、特殊な設定としてシフトキーを押しながら入力したと見做す
# JIS配列の "+" や英字配列の ":" のように、シフトキーで変わるキーを元のキーをシフト入力したと見做すことができる
# 例えばAZIKで ; を「っ」入力に割り当てている場合に下記のような設定をすることで送り仮名の「っ」を入力できる
# JIS配列
#+,<shift>;
# US配列
#:,<shift>;
