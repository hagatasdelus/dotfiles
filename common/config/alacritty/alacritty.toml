[general]
live_config_reload = true

[window]
opacity = 0.80
blur = true
dynamic_title = true
decorations = "None"

[window.padding]
x = 4
y = 4

[font]
size = 13.0

[font.normal]
family = "UDEV Gothic 35NFLG"
[font.bold]
family = "UDEV Gothic 35NFLG"
[font.italic]
family = "UDEV Gothic 35NFLG"

[scrolling]
history = 10000
multiplier = 3

[env]
TERM = "xterm-256color"

[cursor]
style = "Block"
unfocused_hollow = true

[mouse]
hide_when_typing = true

[bell]
duration = 0

[colors.primary]
background = "#282828"
foreground = "#eeeeee"

[colors.normal]
black = "#282828"
red = "#f43753"
green = "#c9d05c"
yellow = "#ffc24b"
blue = "#b3deef"
magenta = "#d3b987"
cyan = "#73cef4"
white = "#eeeeee"

[colors.bright]
black = "#4c4c4c"
red = "#f43753"
green = "#c9d05c"
yellow = "#ffc24b"
blue = "#b3deef"
magenta = "#d3b987"
cyan = "#73cef4"
white = "#feffff"

[[keyboard.bindings]]
key = "Q"
mods = "Command"
action = "Quit"

[[keyboard.bindings]]
key = "Key0"
mods = "Command"
action = "ResetFontSize"

[[keyboard.bindings]]
key = "Equals"
mods = "Command"
action = "IncreaseFontSize"

[[keyboard.bindings]]
key = "Minus"
mods = "Command"
action = "DecreaseFontSize"
