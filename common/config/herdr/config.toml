onboarding = false

[update]
channel = "stable"
version_check = true
manifest_check = true

[terminal]
default_shell = ""
shell_mode = "auto"
new_cwd = "follow"

[worktrees]
directory = "~/.herdr/worktrees"

[keys]
prefix = "ctrl+q"
rename_workspace = "prefix+$"
new_workspace = "prefix+shift+w"
workspace_picker = "prefix+w"
detach = "prefix+q"
next_tab = "ctrl+tab"
previous_tab = "ctrl+shift+tab"
new_tab = "super+t"
close_tab = "super+w"
switch_tab = "super+1..9"

split_vertical = ["prefix+=", "prefix+|"]
split_horizontal = "prefix+minus"
close_pane = "prefix+x"
zoom = "prefix+z"
focus_pane_left = "prefix+h"
focus_pane_down = "prefix+j"
focus_pane_up = "prefix+k"
focus_pane_right = "prefix+l"

copy_mode = "prefix+["

goto = ["super+p", "ctrl+shift+p"]

resize_mode = "prefix+s"

navigate_workspace_up = "up"
navigate_workspace_down = "down"
navigate_pane_left = "h"
navigate_pane_down = "j"
navigate_pane_up = "k"
navigate_pane_right = "l"

[[keys.command]]
key = "prefix+shift+k"
type = "pane"
command = "~/dev/ghq/github.com/hagatasdelus/dotfiles/scripts/karabiner-profile.sh"
description = "Toggle Karabiner profile (US/JIS)"

[[keys.command]]
key = "prefix+shift+c"
type = "pane"
command = "~/dev/ghq/github.com/hagatasdelus/dotfiles/scripts/caffeinate.sh"
description = "Caffeinate: prevent sleep"

[[keys.command]]
key = "prefix+m"
type = "shell"
command = "osascript -e 'tell application \"System Events\" to tell (first process whose frontmost is true) to perform action \"AXZoomWindow\" of (first button of window 1 whose subrole is \"AXFullScreenButton\")'"
description = "Maximize OS Window"

[theme]
name = "kanagawa"
auto_switch = true
light_name = "kanagawa-lotus"
dark_name = "kanagawa"

[theme.custom]
panel_bg = "reset"
accent = "#CDFF04"

[ui]
sidebar_width = 26
sidebar_min_width = 18
sidebar_max_width = 36
mobile_width_threshold = 64
mouse_capture = true
confirm_close = true
prompt_new_tab_name = true
pane_borders = true
pane_gaps = true
show_agent_labels_on_pane_borders = true
agent_panel_sort = "priority"
accent = "#CDFF04"

[ui.toast]
delivery = "off"
delay_seconds = 1

[ui.toast.herdr]
position = "bottom-right"

[ui.toast.clipboard]
enabled = true
position = "bottom-center"

[ui.sound]
enabled = true

[session]
resume_agents_on_restore = true

[remote]
manage_ssh_config = true

[experimental]
allow_nested = false
kitty_graphics = true
pane_history = false
switch_ascii_input_source_in_prefix = true
reveal_hidden_cursor_for_cjk_ime = true
cjk_ime_cursor_shape = "steady_block"

[advanced]
scrollback_limit_bytes = 10000000
