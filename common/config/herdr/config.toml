# herdr configuration
# Cloned and adapted for WezTerm settings (common/config/wezterm)

onboarding = false

[update]
channel = "stable"
version_check = true
manifest_check = true

[terminal]
# Use default shell from environment
default_shell = ""
shell_mode = "auto"
new_cwd = "follow"

[worktrees]
directory = "~/.herdr/worktrees"

[keys]
# Prefix key: wezterm's leader is ctrl+q
prefix = "ctrl+q"

# Workspace operations (wezterm-like)
# Rename workspace: wezterm is LEADER + $
rename_workspace = "prefix+$"
# Create new workspace: wezterm is LEADER + W
new_workspace = "prefix+shift+w"
# Select workspace: wezterm is LEADER + w
workspace_picker = "prefix+w"
# Detach (leave server running):
detach = "prefix+q"

# Tab operations (wezterm-like)
# Next tab: wezterm is CTRL + Tab
next_tab = "ctrl+tab"
# Previous tab: wezterm is SHIFT + CTRL + Tab
previous_tab = "ctrl+shift+tab"
# New tab: wezterm is SUPER + t (Cmd + t)
new_tab = "super+t"
# Close tab: wezterm is SUPER + w (Cmd + w)
close_tab = "super+w"
# Switch tab 1..9: wezterm is SUPER + 1..9
switch_tab = "super+1..9"

# Pane operations (wezterm-like)
# Split vertical (左右分割): wezterm is LEADER + = / LEADER + |
split_vertical = ["prefix+=", "prefix+|"]
# Split horizontal (上下分割): wezterm is LEADER + -
split_horizontal = "prefix+minus"
# Close pane: wezterm is LEADER + x
close_pane = "prefix+x"
# Toggle zoom: wezterm is LEADER + z
zoom = "prefix+z"
# Focus pane Left/Down/Up/Right: wezterm is LEADER + h/j/k/l
focus_pane_left = "prefix+h"
focus_pane_down = "prefix+j"
focus_pane_up = "prefix+k"
focus_pane_right = "prefix+l"

# Copy mode: wezterm is LEADER + [
copy_mode = "prefix+["

# Command palette / Goto: wezterm is SUPER + p / CTRL + SHIFT + p
goto = ["super+p", "ctrl+shift+p"]

# Resize mode: wezterm is LEADER + s (setting_mode)
resize_mode = "prefix+s"

# Local shortcuts in navigate mode
navigate_workspace_up = "up"
navigate_workspace_down = "down"
navigate_pane_left = "h"
navigate_pane_down = "j"
navigate_pane_up = "k"
navigate_pane_right = "l"

[[keys.command]]
key = "prefix+shift+k"
type = "shell"
command = "~/dotfiles/scripts/karabiner-toggle.sh"
description = "Toggle Karabiner profile (US/JIS)"

[[keys.command]]
key = "prefix+shift+c"
type = "pane"
command = "~/dotfiles/scripts/caffeinate-menu.sh"
description = "Caffeinate: prevent sleep (menu)"

[theme]
name = "kanagawa"
auto_switch = true
light_name = "kanagawa-lotus"
dark_name = "kanagawa"

[theme.custom]
# Retain WezTerm background transparency (opacity=0.7) and color scheme
panel_bg = "reset"
# Accent color mimicking WezTerm active tab color (#CDFF04)
accent = "#CDFF04"

[ui]
sidebar_width = 26
sidebar_min_width = 18
sidebar_max_width = 36
mobile_width_threshold = 64
mouse_capture = true
confirm_close = true
prompt_new_tab_name = true
pane_borders = true
pane_gaps = true
show_agent_labels_on_pane_borders = true
agent_panel_sort = "spaces"
# Match WezTerm active highlight color
accent = "#CDFF04"

[ui.toast]
delivery = "off"
delay_seconds = 1

[ui.toast.herdr]
position = "bottom-right"

[ui.toast.clipboard]
enabled = true
position = "bottom-center"

[ui.sound]
enabled = true

[session]
resume_agents_on_restore = true

[remote]
manage_ssh_config = true

[experimental]
allow_nested = false
kitty_graphics = true
pane_history = false
# Fix CJK IME on macOS inside prefix mode and TUIs
switch_ascii_input_source_in_prefix = true
reveal_hidden_cursor_for_cjk_ime = true
cjk_ime_cursor_shape = "steady_block"

[advanced]
scrollback_limit_bytes = 10000000
